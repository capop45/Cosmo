<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Ano de Cosmo</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <header class="hero">
        <div class="space-elements">
            <div class="rocket">🚀</div>
            <div class="astronaut">👨‍🚀</div>
            <div class="planet">🪐</div>
        </div>
        <div class="hero-content">
            <div class="badge">Celebração Estelar</div>
            <h1 class="title">1 Ano de <span class="gradient-text">Cosmo</span></h1>
            <p class="subtitle">Uma jornada inesquecível pelo tempo e espaço, capturada em memórias cósmicas.</p>
        </div>
        <div class="scroll-indicator">
            <span>Deslize para explorar</span>
            <div class="mouse"></div>
        </div>
    </header>

    <section class="marquee-section">
        <div class="marquee-container" id="marquee-container">
            <div class="marquee-track" id="marquee-track">
                <!-- Imagens injetadas via JS -->
            </div>
        </div>
    </section>

    <main class="timeline-container">
        <h2 class="section-title">Nossa História</h2>
        <div class="timeline" id="timeline">
            <!-- Timeline injetada via JS -->
        </div>
    </main>

    <footer class="footer">
        <p>Com amor, guardando nossos melhores momentos. &copy; 2026 Cosmo</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="close-btn">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Imagem ampliada" style="display: none;">
            <video id="lightbox-video" controls style="display: none;"></video>
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <!-- Particles.js for Celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
